# Railway Nixpacks configuration
# Installs system packages needed by pytesseract and pdf2image

[phases.setup]
nixPkgs = [
  "tesseract",
  "poppler_utils",
  "libstdcxx5",
  "gcc"
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
